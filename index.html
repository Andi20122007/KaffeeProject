<!DOCTYPE html>
<html lang="de">
    <head>

        <title>Café Morgenrot</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Café Morgenrot</h1>
            <p>Frischer Kaffee und hausgemachter Kuchen</p>
        </header>
        <main>
            <section>
                <h2>Willkommen</h2>
                <p>Besuchen Sie unser gemütliches Café im Stadtzentrum.</p>
            </section>
            <section>
                <h2>Unsere Spezialitäten</h2>
                <ul>
                    <li>Espresso</li>
                    <li>Cappuccino</li>
                    <li>Apfelstrudel</li>
                </ul>
            </section>
            <section>
                <h2>Sommeraktion</h2>
                <p>Eiskaffee zum Aktionspreis!</p>
            </section>
            <p>Öffnungszeiten: Montag bis Freitag 8:00 bis 18:00 Uhr</p>

        <script src="script.js"></script>
    </body>
</html>
